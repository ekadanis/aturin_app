name: aturin_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  sqflite: ^2.4.2
  path: ^1.8.3
  
  alarm: ^5.1.2
  permission_handler: ^11.0.1
  timelines_plus: ^1.0.6
  animated_splash_screen: ^1.3.0
  flutter_native_splash: ^2.4.6
  shared_preferences: ^2.5.3
  flutter_svg: ^2.1.0
  auto_route: ^10.0.1
  sizer: ^3.0.5
  provider: ^6.1.1
  flutter_slidable: ^3.0.1
  numberpicker: ^2.1.2
  shimmer: ^3.0.0
  animated_toggle_switch: ^0.8.5
  panara_dialogs: ^0.1.5
  popover: ^0.3.1
  http: ^1.4.0
  dots_indicator: ^2.1.0
  table_calendar: ^3.2.0
  connectivity_plus: ^6.0.5
  loading_animation_widget: ^1.3.0
  home_widget: ^0.8.0
  flutter_cache_manager: ^3.4.1

dev_dependencies: 
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  auto_route_generator: ^10.0.1
  build_runner: ^2.4.15

dependency_overrides:
  intl: ^0.20.0
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/
    - assets/images/splash_screen/
    - assets/images/onboarding_images/
    - assets/avatars/
    - assets/activitycategory/iconcard/
    - assets/activitycategory/chipicon/
    - assets/activitycategory/
    - assets/images/no_internet/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
